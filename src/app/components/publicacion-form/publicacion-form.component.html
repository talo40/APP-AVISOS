<form [formGroup]="publicacionForm" (ngSubmit)="save()">
  <ion-list>
    <ion-item>
      <ion-input label="Título" labelPlacement="floating" formControlName="titulo" type="text" placeholder="Mínimo 5 caracteres"></ion-input>
    </ion-item>
    <ion-item *ngIf="publicacionForm.get('titulo')?.invalid && publicacionForm.get('titulo')?.touched">
      <ion-label color="danger" class="ion-text-wrap">
        El título es obligatorio y debe tener al menos 5 caracteres.
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-input label="Descripción" labelPlacement="floating" formControlName="descripcion" type="text" placeholder="Mínimo 20 caracteres"></ion-input>
    </ion-item>
    <ion-item *ngIf="publicacionForm.get('descripcion')?.invalid && publicacionForm.get('descripcion')?.touched">
      <ion-label color="danger" class="ion-text-wrap">
        La descripción es obligatoria y debe tener al menos 20 caracteres.
      </ion-label>
    </ion-item>
  </ion-list>

  <div class="ion-padding">
    <ion-button expand="block" color="secondary" (click)="takePicture()" type="button">
      Tomar Fotografía
    </ion-button>
  </div>

  <div class="ion-text-center" *ngIf="fotoBase64">
    <img [src]="fotoBase64" style="max-height: 200px; border-radius: 8px;" />
  </div>

  <div class="ion-padding">
    <ion-button expand="block" type="submit" [disabled]="publicacionForm.invalid">
      Guardar Publicación
    </ion-button>
  </div>
</form>
