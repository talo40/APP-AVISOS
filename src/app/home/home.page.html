<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>
      Examen Final - App Avisos
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Mis Avisos</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Nueva Publicación</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <app-publicacion-form (onSave)="onAddPublicacion($event)"></app-publicacion-form>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Lista de Publicaciones</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <app-publicacion-list [publicaciones]="publicaciones" (onDelete)="onDeletePublicacion($event)"></app-publicacion-list>
    </ion-card-content>
  </ion-card>
</ion-content>
